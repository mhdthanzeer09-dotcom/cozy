<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Reader - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>🇩🇪 German Reader</h1>
            <p>Learn German through interactive reading</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <h2>Login</h2>
            
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary">Login</button>

            <p class="auth-switch">
                Don't have an account? 
                <span class="toggle-form" onclick="toggleForms()">Sign up</span>
            </p>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="auth-form">
            <h2>Create Account</h2>
            
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label for="signupConfirm">Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn-primary">Sign Up</button>

            <p class="auth-switch">
                Already have an account? 
                <span class="toggle-form" onclick="toggleForms()">Login</span>
            </p>
        </form>

        <div id="errorMessage" class="error-message"></div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
